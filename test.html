<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEST</title>
  <style>
    body { 
      margin: 0; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      background: #0A0A0A; 
      color: white; 
      font-family: system-ui, sans-serif; 
      text-align: center;
      padding: 2rem;
    }
    .ok { font-size: 3rem; margin-bottom: 1rem; }
    .info { background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; margin: 1rem 0; }
    button { 
      background: #38bdf8; 
      color: #0A0A0A; 
      border: none; 
      padding: 1rem 2rem; 
      border-radius: 12px; 
      font-weight: 600; 
      font-size: 1rem; 
      cursor: pointer; 
      margin: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="ok">✅ IT WORKS!</div>
  <p>Если вы видите этот текст — базовая загрузка файлов на GitHub Pages работает.</p>
  
  <div class="info">
    <strong>📱 Информация:</strong><br>
    <span id="ua">Загрузка...</span><br>
    <span id="https">Загрузка...</span><br>
    <span id="path">Загрузка...</span>
  </div>

  <button onclick="testAPI()">🌦 Тест API</button>
  <button onclick="testManifest()">📋 Тест Manifest</button>
  
  <div id="result" style="margin-top:1rem; font-family:monospace; font-size:0.85rem; white-space:pre-wrap; background:#000; padding:1rem; border-radius:8px; max-width:100%;"></div>

  <script>
    // Показываем инфо
    document.getElementById('ua').textContent = navigator.userAgent.slice(0, 80) + '...';
    document.getElementById('https').textContent = 'HTTPS: ' + (location.protocol === 'https:' ? '✅ Да' : '❌ Нет');
    document.getElementById('path').textContent = 'Path: ' + location.pathname;

    // Тест API
    async function testAPI() {
      const out = document.getElementById('result');
      out.textContent = '🔄 Запрос к Visual Crossing...';
      try {
        const res = await fetch('https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/55.7558,37.6173/next30days?unitGroup=metric&include=days&key=7QKDX6PBE6GQDC4WEU4A9J3KL');
        out.textContent += `\n✅ Статус: ${res.status}`;
        if (!res.ok) { const t = await res.text(); out.textContent += `\n❌ Ответ: ${t.slice(0,200)}`; return; }
        const json = await res.json();
        out.textContent += `\n✅ Дней прогноза: ${json.days?.length}`;
        out.textContent += `\n✅ Город: ${json.resolvedAddress || 'N/A'}`;
      } catch(e) { out.textContent += `\n❌ Ошибка: ${e.message}`; }
    }

    // Тест Manifest
    async function testManifest() {
      const out = document.getElementById('result');
      out.textContent = '🔄 Проверка manifest.json...';
      try {
        // Пробуем разные пути
        const paths = ['./manifest.json', 'manifest.json', '/skypulse-elite-/manifest.json', '/manifest.json'];
        for (const p of paths) {
          try {
            const res = await fetch(p);
            if (res.ok) {
              const m = await res.json();
              out.textContent += `\n✅ Найден по пути: ${p}`;
              out.textContent += `\n✅ Name: ${m.name}`;
              return;
            }
          } catch(e) { /* пробуем следующий */ }
        }
        out.textContent += `\n❌ Не найден ни по одному пути`;
      } catch(e) { out.textContent += `\n❌ Ошибка: ${e.message}`; }
    }
  </script>
</body>
</html>
