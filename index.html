<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyPulse Elite</title>
  <link rel="manifest" href="/skypulse-elite-/manifest.json">
  <meta name="theme-color" content="#0A0A0A">
  <style>
    :root { --accent: #38bdf8; --mesh1: #1e3a8a; --mesh2: #0f172a; }
    body { margin: 0; background: #0A0A0A; color: white; font-family: system-ui, sans-serif; min-height: 100vh; background-image: radial-gradient(circle at 15% 20%, var(--mesh1) 0%, transparent 45%), radial-gradient(circle at 85% 85%, var(--mesh2) 0%, transparent 45%); }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem; padding: 1rem; margin: 0.5rem 0; }
    .hidden { display: none; }
    #lottie-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    #app { position: relative; z-index: 10; padding: 1rem; max-width: 800px; margin: 0 auto; }
    .btn { background: var(--accent); color: #0A0A0A; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; margin: 0.25rem; }
  </style>
</head>
<body>
  <div id="lottie-bg"></div>
  <div id="app"></div>

  <!-- React + ReactDOM (production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Lottie -->
  <script src="https://unpkg.com/lottie-web@5.12.2/build/player/lottie.min.js"></script>

  <script>
    const { useState, useEffect, useRef } = React;

    // Простой компонент без JSX
    function App() {
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [weather, setWeather] = useState(null);
      const lottieRef = useRef(null);

      useEffect(() => {
        // Тест: просто показываем, что компонент рендерится
        console.log('✅ App component mounted');
        
        // Загружаем погоду
        fetch('https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/55.7558,37.6173/next30days?unitGroup=metric&include=days&key=7QKDX6PBE6GQDC4WEU4A9J3KL')
          .then(r => { if (!r.ok) throw new Error('API ' + r.status); return r.json(); })
          .then(json => {
            setWeather(json.days[0]);
            // Простая анимация фона
            if (lottieRef.current) lottieRef.current.destroy();
            const asset = json.days[0].conditions?.toLowerCase().includes('rain') 
              ? 'https://assets9.lottiefiles.com/packages/lf20_7s7h3q5k.json'
              : 'https://assets9.lottiefiles.com/packages/lf20_jbrw3hcz.json';
            lottieRef.current = lottie.loadAnimation({
              container: document.getElementById('lottie-bg'),
              renderer: 'svg',
              loop: true,
              autoplay: true,
              path: asset
            });
          })
          .catch(e => setError(e.message))
          .finally(() => setLoading(false));
      }, []);

      if (loading) {
        return React.createElement('div', { style: { textAlign: 'center', padding: '2rem' } },
          React.createElement('div', { style: { fontSize: '2rem', marginBottom: '1rem' } }, '⏳'),
          React.createElement('p', null, 'Загрузка...')
        );
      }

      if (error) {
        return React.createElement('div', { style: { textAlign: 'center', padding: '2rem', color: '#ef4444' } },
          React.createElement('div', { style: { fontSize: '2rem', marginBottom: '1rem' } }, '⚠️'),
          React.createElement('p', null, 'Ошибка: ' + error),
          React.createElement('button', { className: 'btn', style: { marginTop: '1rem' }, onClick: () => window.location.reload() }, '🔄 Повторить')
        );
      }

      return React.createElement('div', null,
        React.createElement('div', { className: 'card', style: { textAlign: 'center' } },
          React.createElement('h1', { style: { fontSize: '1.5rem', marginBottom: '0.5rem' } }, '🌤️ SkyPulse Elite'),
          React.createElement('p', { style: { color: '#888', fontSize: '0.9rem' } }, new Date().toLocaleDateString('ru-RU')),
          React.createElement('div', { style: { fontSize: '3rem', fontWeight: 'bold', margin: '1rem 0' } }, weather.tempmax.toFixed(1) + '°'),
          React.createElement('p', { style: { textTransform: 'capitalize' } }, weather.conditions)
        ),
        React.createElement('div', { className: 'card' },
          React.createElement('p', null, '✅ Приложение работает!'),
          React.createElement('p', { style: { fontSize: '0.85rem', color: '#888' } }, 'API: Visual Crossing • Данные: 30 дней')
        )
      );
    }

    // Рендер
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
